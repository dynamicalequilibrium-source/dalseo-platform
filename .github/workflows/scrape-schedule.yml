name: 🤖 Daily Scraping

# 매일 자정(UTC+0) 실행 = 한국 시간 오전 9시
on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 자정
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 anthropic

      - name: 🔑 API 키 설정
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env.local

      - name: 🚀 스크래핑 실행
        run: python scripts/scraper/scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 📤 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          if git diff --quiet; then
            echo "변경사항 없음"
          else
            git add data/programs.db
            git commit -m "🤖 chore: automated daily scraping $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi

      - name: 📊 실행 결과 로그
        if: always()
        run: echo "✅ 스크래핑 완료 $(date '+%Y-%m-%d %H:%M:%S (KST)')"
